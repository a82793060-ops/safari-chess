<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شطرنج السفاري 🦁 Safari Chess</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+Bhaijaan+2:wght@500;700;800&family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=3">
</head>
<body>

<header id="topbar">
  <button class="logo" id="btn-logo" title="الصفحة الرئيسية">
    <span class="logo-icon">🦁</span>
    <span class="logo-text" data-i18n="title">شطرنج السفاري</span>
  </button>
  <div class="topbar-btns">
    <button id="btn-lang" class="chip-btn" title="Language">EN</button>
    <button id="btn-sound" class="chip-btn" title="Sound">🔊</button>
  </div>
</header>

<!-- ======== شاشة الإعداد ======== -->
<main id="setup-screen">
  <div id="mode-tabs">
    <button class="mode-tab selected" data-mode="bot">🐾 <span data-i18n="modeBot">ضد الحيوانات</span></button>
    <button class="mode-tab" data-mode="online">🔗 <span data-i18n="modeOnline">مع صديق عبر رابط</span></button>
  </div>

  <div id="bot-setup">
    <h1 class="setup-title" data-i18n="chooseOpponent">اختر خصمك</h1>
    <p class="setup-sub" data-i18n="setupSub">كل حيوان أقوى من الذي قبله... فمن تجرؤ على تحديه؟</p>
    <div id="bot-grid"></div>
  </div>

  <div id="online-setup" hidden>
    <h1 class="setup-title" data-i18n="playWithFriend">العب مع صديقك</h1>
    <p class="setup-sub" data-i18n="onlineExplain">أنشئ رابط الدعوة وأرسله لصديقك، وسيبدأ اللعب فور انضمامه</p>
    <div id="invite-box" hidden>
      <div class="invite-row">
        <input id="invite-link" readonly dir="ltr">
        <button id="btn-copy-link" class="side-btn" data-i18n="copy">نسخ</button>
      </div>
      <p id="invite-status" class="pulse-text"></p>
    </div>
  </div>

  <div id="guest-connect" hidden>
    <h1 class="setup-title" data-i18n="playWithFriend">العب مع صديقك</h1>
    <p id="guest-status" class="setup-sub pulse-text"></p>
  </div>

  <section class="color-section">
    <h2 data-i18n="chooseColor">العب بقطع</h2>
    <div id="color-picker">
      <button class="color-btn" data-color="w">
        <span class="color-piece" id="cp-white"></span>
        <span data-i18n="white">الأبيض</span>
      </button>
      <button class="color-btn selected" data-color="random">
        <span class="color-piece dice">🎲</span>
        <span data-i18n="random">عشوائي</span>
      </button>
      <button class="color-btn" data-color="b">
        <span class="color-piece" id="cp-black"></span>
        <span data-i18n="black">الأسود</span>
      </button>
    </div>
  </section>

  <button id="btn-start" class="big-btn" data-i18n="startGame">ابدأ المعركة!</button>
  <button id="btn-create-link" class="big-btn" data-i18n="createLink" hidden>أنشئ رابط الدعوة</button>
  <p id="engine-status" class="engine-status"></p>
</main>

<!-- ======== شاشة اللعب ======== -->
<main id="game-screen" hidden>
  <div class="game-layout">

    <div class="board-column">
      <!-- بطاقة البوت -->
      <div class="player-card" id="bot-card">
        <div class="avatar-wrap">
          <div class="avatar" id="bot-avatar"></div>
          <div class="speech-bubble" id="bot-bubble" hidden></div>
        </div>
        <div class="pc-info">
          <div class="pc-name" id="bot-name"></div>
          <div class="pc-elo" id="bot-elo"></div>
        </div>
        <div class="captured" id="captured-by-bot"></div>
      </div>

      <div id="board-frame">
        <div id="board"></div>
        <div id="promo-picker" hidden></div>
      </div>

      <!-- بطاقة اللاعب -->
      <div class="player-card" id="human-card">
        <div class="avatar-wrap">
          <div class="avatar human-avatar" id="human-avatar">🧑‍🌾</div>
        </div>
        <div class="pc-info">
          <div class="pc-name" data-i18n="you">أنت</div>
          <div class="pc-elo" id="human-status"></div>
        </div>
        <div class="captured" id="captured-by-human"></div>
      </div>
    </div>

    <aside class="side-panel">
      <div class="status-banner" id="status-banner"></div>
      <div class="move-list-wrap">
        <div class="move-list-title" data-i18n="moves">النقلات</div>
        <ol id="move-list"></ol>
      </div>
      <div class="side-btns">
        <button id="btn-hint" class="side-btn">💡 <span data-i18n="hint">تلميح</span></button>
        <button id="btn-undo" class="side-btn">↩️ <span data-i18n="undo">تراجع</span></button>
        <button id="btn-resign" class="side-btn">🏳️ <span data-i18n="resign">استسلام</span></button>
        <button id="btn-newgame" class="side-btn">🏠 <span data-i18n="changeBot">تغيير الخصم</span></button>
      </div>

      <!-- الدردشة (طور اللعب مع صديق) -->
      <div class="chat-wrap" id="chat-wrap" hidden>
        <div class="chat-title" data-i18n="chat">الدردشة</div>
        <div id="chat-messages"></div>
        <div id="emoji-panel" hidden></div>
        <div class="chat-input-row">
          <button id="btn-emoji" title="Emoji">😀</button>
          <input id="chat-input" maxlength="200" autocomplete="off">
          <button id="btn-chat-send" data-i18n="send">إرسال</button>
        </div>
      </div>
    </aside>

  </div>
</main>

<!-- ======== نافذة نهاية اللعبة ======== -->
<div id="end-modal" class="modal-overlay" hidden>
  <div class="modal-box">
    <div class="modal-avatar" id="end-avatar"></div>
    <h2 id="end-title"></h2>
    <p id="end-sub"></p>
    <div class="modal-btns">
      <button id="btn-rematch" class="big-btn" data-i18n="rematch">مبارة أخرى</button>
      <button id="btn-end-home" class="big-btn secondary" data-i18n="changeBot">تغيير الخصم</button>
    </div>
  </div>
</div>

<canvas id="confetti"></canvas>

<script src="js/lib/chess.js?v=3"></script>
<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script src="js/i18n.js?v=3"></script>
<script src="js/pieces.js?v=3"></script>
<script src="js/bots.js?v=3"></script>
<script src="js/sounds.js?v=3"></script>
<script src="js/engine.js?v=3"></script>
<script src="js/net.js?v=3"></script>
<script src="js/game.js?v=3"></script>
</body>
</html>
